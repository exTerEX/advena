name: Build and push Docker image

on:
  push:
    branches:
      - main
    paths:
      - "env/Dockerfile"
      - "env/environment.yml"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      icescreen_version:
        description: "ICEscreen version to install"
        required: false
        default: "1.3.3"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set ICEscreen version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "icescreen_version=${{ github.event.inputs.icescreen_version }}" >> $GITHUB_OUTPUT
          else
            echo "icescreen_version=1.3.3" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/exterex/icescreen-advena
          tags: |
            type=raw,value=${{ steps.version.outputs.icescreen_version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: env/
          file: env/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ICESCREEN_VERSION=${{ steps.version.outputs.icescreen_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
